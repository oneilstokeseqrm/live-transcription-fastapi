[pytest]
asyncio_mode = strict
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
markers =
    requires_db_write: test writes to the shared production Neon test tenant. Skipped by default; set RUN_DESTRUCTIVE_TESTS=1 to enable. Always check for concurrent agents in other repos before enabling (see tasks/lessons.md "Tenant-scoped DELETE is NOT session-scoped").
